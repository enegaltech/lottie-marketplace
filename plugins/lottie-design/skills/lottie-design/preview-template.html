<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Lottie preview — {{name}}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js" type="module"></script>
  <style>
    :root { color-scheme: light dark; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0b0d10;
      color: #e6e8eb;
    }
    .stage {
      display: grid;
      gap: 1rem;
      padding: 2rem;
      border: 1px solid #1f242b;
      border-radius: 12px;
      background: #11141a;
      min-width: 320px;
      text-align: center;
    }
    h1 { font-size: 0.95rem; font-weight: 500; margin: 0; opacity: 0.7; }
    .meta { font-size: 0.75rem; opacity: 0.5; word-break: break-all; }
    dotlottie-wc { width: 320px; height: 320px; }
    .controls { display: flex; gap: .5rem; justify-content: center; }
    button {
      background: #1f242b;
      color: #e6e8eb;
      border: 1px solid #2a313a;
      padding: .4rem .8rem;
      border-radius: 6px;
      font: inherit;
      cursor: pointer;
    }
    button:hover { background: #2a313a; }
  </style>
</head>
<body>
  <div class="stage">
    <h1>{{name}}</h1>
    <dotlottie-wc id="lottie" src="{{src}}" autoplay loop></dotlottie-wc>
    <div class="controls">
      <button onclick="document.getElementById('lottie').play()">Play</button>
      <button onclick="document.getElementById('lottie').pause()">Pause</button>
      <button onclick="document.getElementById('lottie').stop()">Stop</button>
    </div>
    <div class="meta">{{src}}</div>
  </div>
</body>
</html>
