<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" width="900" height="460" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0d10"/>
      <stop offset="100%" stop-color="#11141a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FF0066"/>
      <stop offset="100%" stop-color="#FFBF3F"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="460" fill="url(#bg)"/>

  <!-- title -->
  <text x="450" y="46" fill="#e6e8eb" font-size="22" font-weight="600" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif">
    🎬 Lottie Design Skill — prompt to component in 30 seconds
  </text>
  <text x="450" y="72" fill="#7a8290" font-size="13" text-anchor="middle" font-family="ui-sans-serif,system-ui,sans-serif">
    197 free animations · React · React Native · Flutter · Vanilla
  </text>

  <!-- terminal window -->
  <g transform="translate(60,100)">
    <rect width="780" height="320" rx="10" fill="#161a20" stroke="#262d36"/>
    <circle cx="20" cy="20" r="6" fill="#FF5F57"/>
    <circle cx="40" cy="20" r="6" fill="#FEBC2E"/>
    <circle cx="60" cy="20" r="6" fill="#28C840"/>
    <text x="100" y="25" fill="#7a8290" font-size="12">claude-code</text>

    <!-- divider -->
    <line x1="0" y1="40" x2="780" y2="40" stroke="#262d36"/>

    <!-- prompt -->
    <text x="20" y="78" fill="#7a8290" font-size="14">&gt;</text>
    <text x="40" y="78" fill="#e6e8eb" font-size="14">add a checkout success animation to my React app</text>

    <!-- spinner / processing -->
    <text x="20" y="118" fill="url(#accent)" font-size="14" filter="url(#glow)">▎</text>
    <text x="40" y="118" fill="#9aa3b1" font-size="13">📦 Installing @lottiefiles/dotlottie-react with pnpm…</text>

    <text x="20" y="150" fill="#9aa3b1" font-size="13">🔍 Searching catalog · 197 entries · matched 3 in</text>
    <text x="425" y="150" fill="#FF0066" font-size="13" font-weight="600">success</text>

    <text x="20" y="182" fill="#9aa3b1" font-size="13">🎯 Picked </text>
    <text x="92" y="182" fill="#FFBF3F" font-size="13">lf-success-confetti</text>
    <text x="240" y="182" fill="#9aa3b1" font-size="13">· duration 1.57s · 25KB · </text>
    <text x="450" y="182" fill="#9aa3b1" font-size="13">color </text>
    <rect x="490" y="172" width="12" height="12" rx="2" fill="#00CF33"/>
    <text x="510" y="182" fill="#9aa3b1" font-size="13">#00CF33</text>

    <text x="20" y="214" fill="#9aa3b1" font-size="13">📝 Wrote </text>
    <text x="92" y="214" fill="#62D9FB" font-size="13">src/components/animations/CheckoutSuccess.tsx</text>

    <text x="20" y="246" fill="#9aa3b1" font-size="13">⚖️ License: Lottie Simple License (no attribution required)</text>

    <text x="20" y="278" fill="#9aa3b1" font-size="13">🖼️ Preview opened in browser → </text>
    <text x="265" y="278" fill="#62D9FB" font-size="13">preview-CheckoutSuccess.html</text>

    <!-- success line -->
    <rect x="0" y="290" width="780" height="30" fill="#0d1f12"/>
    <text x="20" y="310" fill="#43E37D" font-size="13" font-weight="600">
      ✅ Lottie skill ile checkout success animasyonu başarıyla eklendi · 28s
    </text>
  </g>

  <!-- bottom badges -->
  <g transform="translate(60,440)" font-size="11" fill="#7a8290">
    <text x="0" y="0">install:</text>
    <text x="55" y="0" fill="#e6e8eb">/plugin marketplace add enegaltech/lottie-marketplace</text>
  </g>
</svg>
